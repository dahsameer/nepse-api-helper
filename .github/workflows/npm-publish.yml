name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build
        run: pnpm build
        
      - name: Test
        run: pnpm test

      - name: Check OIDC environment
        run: |
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:+present}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+present}"

      - name: Request OIDC token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken("npm:registry.npmjs.org");
            console.log(token ? "OIDC token acquired" : "No token");
      
      - name: Publish to NPM
        run: pnpm publish --no-git-checks --provenance --reporter=append-only
        env:
          NPM_CONFIG_LOGLEVEL: verbose